<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naval Price Watch - Pink & Skyblue Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --pink: #ff0080;
            --skyblue: #00b4ff;
            --primary-gradient: linear-gradient(135deg, var(--pink) 0%, var(--skyblue) 100%);
        }
        
        body { 
            background-color: #f4f7f6; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        /* --- HERO SECTION --- */
        .hero-section { 
            background: #001f3f; 
            color: white; 
            padding: 4rem 1rem; 
            border-bottom: 5px solid var(--pink); 
        }

        /* --- RESPONSIVE 3D CARD --- */
        .card-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .uiverse-card {
            width: 100%;
            background: var(--primary-gradient);
            border-radius: 30px;
            position: relative;
            z-index: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 25px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Hover Effect for Desktop */
        @media (min-width: 992px) {
            .card-container:hover .uiverse-card {
                transform: rotateX(8deg) rotateY(-8deg) translateY(-10px);
                box-shadow: 0 30px 60px rgba(255, 0, 128, 0.3);
            }
        }

        /* Concentric Circles UI */
        .uiverse-card::after {
            content: ""; position: absolute; width: 180px; height: 180px;
            background: rgba(255, 255, 255, 0.1); border-radius: 50%;
            top: -40px; right: -40px; z-index: -1;
            box-shadow: 0 0 0 35px rgba(255, 255, 255, 0.05), 0 0 0 70px rgba(255, 255, 255, 0.05);
        }

        /* --- LATEST PRICE AREA --- */
        .latest-price-section {
            color: white;
            text-align: center;
            padding: 10px 0 25px 0;
        }

        .latest-val {
            font-size: 3.5rem; /* VERY LARGE PRICE */
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: block;
            margin: 10px 0;
        }

        .latest-unit {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
            font-weight: 700;
        }

        .current-label {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(4px);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            display: inline-block;
        }

        /* --- HISTORY GLASS OVERLAY --- */
        .glass-history {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 22px;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            margin-top: auto;
        }

        .history-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            margin-bottom: 10px;
            opacity: 0.8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
        }

        .prev-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .prev-row:last-child { border: none; }

        .prev-date { font-size: 0.8rem; font-weight: 500; }
        .prev-price { font-size: 1rem; font-weight: 800; }

        /* TREND INDICATORS */
        .trend-pill {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 8px;
            font-weight: 900;
            margin-left: 10px;
        }
        .up { background: var(--pink); color: white; box-shadow: 0 0 10px rgba(255,0,128,0.5); }
        .down { background: var(--skyblue); color: #001f3f; box-shadow: 0 0 10px rgba(0,180,255,0.5); }

        .category-header {
            color: #001f3f;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 50px 0 25px 0;
            padding-left: 15px;
            border-left: 6px solid var(--pink);
        }

        /* Search wrapper */
        .search-wrapper { max-width: 600px; margin: 0 auto; }

        @media (max-width: 576px) {
            .latest-val { font-size: 2.8rem; }
            .hero-section { padding: 3rem 1rem; }
        }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <div class="container">
        <h1 class="fw-bold mb-2">NAVAL MARKET WATCH</h1>
        <p class="opacity-75 mb-4">Official Price Monitoring Portal - Naval, Biliran</p>
        <div class="search-wrapper">
            <div class="input-group input-group-lg shadow rounded-pill overflow-hidden bg-white border-0">
                <span class="input-group-text bg-white border-0 ps-4"><i class="bi bi-search text-primary"></i></span>
                <input type="text" id="marketSearchField" class="form-control border-0 ps-2" placeholder="Search product or part..." autocomplete="off">
            </div>
        </div>
    </div>
</div>

<div class="container my-5 pb-5">
    <div id="priceList" class="row">
        <!-- JS Injected Cards -->
    </div>
</div>

<!-- Modal for Login (Triggered by Shift + Z) -->
<div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0 rounded-4">
            <div class="modal-header bg-dark text-white"><h5 class="modal-title">Admin Access</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-4 text-center">
                <input type="email" id="logEmail" class="form-control mb-2" placeholder="Email"><input type="password" id="logPass" class="form-control mb-3" placeholder="Password"><button id="btnLogin" class="btn btn-primary w-100">Sign In</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAyWJulSuH_3gUo76aiLoy5L8ly5tk0ypQ", 
        authDomain: "appdev-80339.firebaseapp.com", 
        projectId: "appdev-80339", 
        storageBucket: "appdev-80339.firebasestorage.app", 
        messagingSenderId: "213205773696", 
        appId: "1:213205773696:web:aca615f3274ee11f09e565" 
    };
    const app = initializeApp(firebaseConfig), db = getFirestore(app), auth = getAuth(app);

    const formatDate = (d) => d ? new Date(d.replace(/-/g, '/')).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}) : '---';
    
    const getAvg = (s) => {
        if(!s) return 0;
        const pts = s.toString().split('-').map(p => parseFloat(p.replace(/[^0-9.]/g, '')));
        return pts.length === 2 ? (pts[0] + pts[1]) / 2 : pts[0] || 0;
    };

    onSnapshot(collection(db, "products"), (snap) => {
        const container = document.getElementById('priceList'); container.innerHTML = "";
        let raw = []; snap.forEach(d => raw.push(d.data()));

        const groups = raw.reduce((acc, item) => {
            const cat = item.category || "General"; const key = `${item.name}-${item.subType}`;
            acc[cat] = acc[cat] || {}; acc[cat][key] = acc[cat][key] || { name: item.name, subType: item.subType, history: [] };
            acc[cat][key].history.push(item); return acc;
        }, {});

        for (const cat in groups) {
            container.innerHTML += `<div class="col-12"><h3 class="category-header">${cat}</h3></div>`;
            for (const k in groups[cat]) {
                const p = groups[cat][k];
                p.history.sort((a, b) => new Date(b.dateFrom) - new Date(a.dateFrom));

                const latest = p.history[0];
                const history = p.history.slice(1, 4);

                let trendHtml = "";
                if (p.history[1]) {
                    const curAvg = getAvg(latest.price), preAvg = getAvg(p.history[1].price);
                    const diff = curAvg - preAvg;
                    if (preAvg > 0 && diff !== 0) {
                        const pct = ((diff / preAvg) * 100).toFixed(1);
                        trendHtml = diff > 0 ? `<span class="trend-pill up"><i class="bi bi-graph-up"></i> +${pct}%</span>` 
                                             : `<span class="trend-pill down"><i class="bi bi-graph-down"></i> ${Math.abs(pct)}%</span>`;
                    }
                }

                let historyHtml = history.map(h => `
                    <div class="prev-row">
                        <span class="prev-date text-truncate me-2">${formatDate(h.dateFrom)}</span>
                        <span class="prev-price">₱${h.price}</span>
                    </div>
                `).join('');

                container.innerHTML += `
                <div class="col-12 col-md-6 col-lg-4 card-container" data-search="${p.name} ${p.subType}">
                    <div class="uiverse-card shadow">
                        <div class="text-center text-white mb-2">
                            <div class="current-label">LATEST MONITORING</div>
                            <h4 class="fw-bold m-0 text-uppercase" style="letter-spacing:1px">${p.name}</h4>
                            <div class="small opacity-75 fw-bold">${p.subType || 'General Entry'}</div>
                        </div>

                        <div class="latest-price-section">
                            <span class="latest-val">₱${latest.price}</span>
                            <span class="latest-unit">PER ${latest.unit || 'KG'}</span>
                            <div class="mt-2 text-center small fw-bold opacity-100">
                                <i class="bi bi-calendar-event me-1"></i>${formatDate(latest.dateFrom)} ${trendHtml}
                            </div>
                        </div>

                        <div class="glass-history">
                            <div class="history-title">Price History</div>
                            ${historyHtml || '<div class="small opacity-50 text-center py-2">No previous data</div>'}
                        </div>
                    </div>
                </div>`;
            }
        }
    });

    document.getElementById('marketSearchField').oninput = (e) => {
        const t = e.target.value.toLowerCase();
        document.querySelectorAll('.card-container').forEach(c => c.style.display = c.getAttribute('data-search').toLowerCase().includes(t) ? "block" : "none");
    };

    window.addEventListener('keydown', (e) => { if (e.shiftKey && e.key.toLowerCase() === 'z') { new bootstrap.Modal(document.getElementById('authModal')).show(); } });
    
    document.getElementById('btnLogin').onclick = async () => {
        try {
            const u = await signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value);
            const d = await getDoc(doc(db, "users", u.user.uid));
            if (d.data().status === 'approved' || d.data().role === 'admin') window.location.href = d.data().role === 'admin' ? "admin.html" : "manager.html";
            else { alert("Awaiting Admin Approval."); auth.signOut(); }
        } catch (e) { alert("Login failed."); }
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
