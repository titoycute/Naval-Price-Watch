<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naval Market Watch - Premium Edition</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --pink: #ff0080; 
            --skyblue: #00b4ff; 
            --primary-gradient: linear-gradient(135deg, var(--pink) 0%, var(--skyblue) 100%); 
        }

        body { 
            background-color: #f4f7f6; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            color: #001f3f;
        }

        /* --- HERO SECTION TYPOGRAPHY --- */
        .hero-section { 
            background: #001f3f; 
            color: white; 
            padding: 5rem 1rem; 
            border-bottom: 6px solid var(--pink); 
            position: relative;
        }

        .hero-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        /* SECRET TRIGGER AREA */
        #secret-trigger { position: absolute; top: 0; right: 0; width: 80px; height: 80px; z-index: 9999; cursor: crosshair; }

        /* --- 3D CARD ENHANCEMENTS --- */
        .card-container { perspective: 1000px; margin-bottom: 35px; }
        .uiverse-card { 
            width: 100%; 
            background: var(--primary-gradient); 
            border-radius: 35px; 
            position: relative; 
            z-index: 1; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            padding: 30px; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
        }

        /* Pricing Typography */
        .latest-val { 
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem; 
            font-weight: 900; 
            line-height: 0.9; 
            text-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            display: block; 
            margin: 15px 0; 
            color: white; 
            letter-spacing: -2px;
        }

        .latest-unit { 
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 800; 
            color: rgba(255,255,255,0.9); 
        }

        .current-label { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(8px); 
            padding: 6px 18px; 
            border-radius: 50px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            letter-spacing: 2px; 
            display: inline-block; 
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .product-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            font-size: 1.5rem;
        }

        /* Glass History Enhancement */
        .glass-history { 
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(25px); 
            border-radius: 25px; 
            padding: 22px; 
            border: 1px solid rgba(255, 255, 255, 0.25); 
            color: white; 
            margin-top: auto; 
        }

        .history-title { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 800; 
            margin-bottom: 15px; 
            opacity: 0.8; 
            border-bottom: 2px solid rgba(255, 255, 255, 0.2); 
            padding-bottom: 8px; 
        }

        .prev-date { font-weight: 600; font-size: 0.85rem; }
        .prev-price { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.1rem; }

        .category-header { 
            font-family: 'Montserrat', sans-serif;
            color: #001f3f; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin: 60px 0 30px 0; 
            padding-left: 20px; 
            border-left: 8px solid var(--pink); 
            font-size: 1.8rem;
        }

        /* Search Input typography */
        .search-input { 
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            border-radius: 50px !important; 
            padding-left: 60px !important; 
            height: 70px; 
            font-size: 1.2rem; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1) !important;
            border: none !important;
        }

        @media (max-width: 576px) { .latest-val { font-size: 3rem; } }
    </style>
</head>
<body>

<div id="secret-trigger"></div>

<div class="hero-section text-center">
    <div class="container">
        <h1 class="hero-title display-3 mb-2">Naval Market Watch</h1>
        <p class="opacity-75 mb-5 text-uppercase fw-bold" style="letter-spacing: 4px; font-size: 0.9rem;">Official Price Monitoring Portal</p>
        <div class="mx-auto" style="max-width: 650px; position: relative;">
            <i class="bi bi-search text-primary" style="position: absolute; left: 25px; top: 50%; transform: translateY(-50%); z-index: 10; font-size: 1.5rem;"></i>
            <input type="text" id="marketSearchField" class="form-control search-input" placeholder="Search product (e.g. Bangus, Diesel, LPG)..." autocomplete="off">
        </div>
    </div>
</div>

<div class="container my-5 pb-5"><div id="priceList" class="row"></div></div>

<!-- Modal remains functionally identical to keep the logic intact -->
<div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0 rounded-5 overflow-hidden text-dark">
            <div class="modal-header bg-dark text-white border-0 py-4"><h5 class="modal-title fw-bold">Management Panel</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-5">
                <ul class="nav nav-pills mb-4 justify-content-center">
                    <li class="nav-item"><button class="nav-link active rounded-pill px-4" data-bs-toggle="pill" data-bs-target="#loginForm">Login</button></li>
                    <li class="nav-item"><button class="nav-link rounded-pill px-4" data-bs-toggle="pill" data-bs-target="#regForm">Register</button></li>
                </ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="loginForm">
                        <input type="email" id="logEmail" class="form-control mb-3 py-3 rounded-4" placeholder="Email"><input type="password" id="logPass" class="form-control mb-4 py-3 rounded-4" placeholder="Password"><button type="button" id="btnLogin" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">Sign In</button>
                    </div>
                    <div class="tab-pane fade" id="regForm">
                        <input type="email" id="regEmail" class="form-control mb-3 py-3 rounded-4" placeholder="Email"><input type="password" id="regPass" class="form-control mb-4 py-3 rounded-4" placeholder="Password"><button type="button" id="btnRegister" class="btn btn-success w-100 py-3 rounded-pill fw-bold">Request Access</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAyWJulSuH_3gUo76aiLoy5L8ly5tk0ypQ", authDomain: "appdev-80339.firebaseapp.com", projectId: "appdev-80339", storageBucket: "appdev-80339.firebasestorage.app", messagingSenderId: "213205773696", appId: "1:213205773696:web:aca615f3274ee11f09e565" };
    const app = initializeApp(firebaseConfig), auth = getAuth(app), db = getFirestore(app);

    const formatDate = (d) => d ? new Date(d.replace(/-/g, '/')).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}) : '---';
    const getAvg = (s) => {
        if(!s) return 0;
        const pts = s.toString().split('-').map(p => parseFloat(p.replace(/[^0-9.]/g, '')));
        return pts.length === 2 ? (pts[0] + pts[1]) / 2 : pts[0] || 0;
    };

    // Secret Triggers
    window.addEventListener('keydown', (e) => { if (e.shiftKey && e.key.toLowerCase() === 'z') new bootstrap.Modal(document.getElementById('authModal')).show(); });
    let lastTap = 0;
    document.getElementById('secret-trigger').addEventListener('click', (e) => {
        const now = Date.now(); if (now - lastTap < 500) new bootstrap.Modal(document.getElementById('authModal')).show();
        lastTap = now;
    });

    onSnapshot(collection(db, "products"), (snap) => {
        const container = document.getElementById('priceList'); container.innerHTML = "";
        let raw = []; snap.forEach(d => raw.push(d.data()));
        const groups = raw.reduce((acc, item) => {
            const cat = item.category || "General"; const key = `${item.name}-${item.subType}`;
            acc[cat] = acc[cat] || {}; acc[cat][key] = acc[cat][key] || { name: item.name, subType: item.subType, history: [] };
            acc[cat][key].history.push(item); return acc;
        }, {});

        for (const cat in groups) {
            container.innerHTML += `<div class="col-12"><h3 class="category-header">${cat}</h3></div>`;
            for (const k in groups[cat]) {
                const p = groups[cat][k]; p.history.sort((a, b) => new Date(b.dateFrom) - new Date(a.dateFrom));
                const latest = p.history[0], history = p.history.slice(1, 4);
                
                let trend = "";
                if (p.history[1]) {
                    const curAvg = getAvg(latest.price), preAvg = getAvg(p.history[1].price), diff = curAvg - preAvg;
                    if (preAvg > 0 && diff !== 0) {
                        const pct = ((diff / preAvg) * 100).toFixed(1);
                        trend = diff > 0 ? `<span class="badge bg-danger ms-2 px-3 py-2 rounded-pill shadow-sm" style="font-size:0.75rem">+${pct}% <i class="bi bi-graph-up"></i></span>` 
                                         : `<span class="badge bg-info text-dark ms-2 px-3 py-2 rounded-pill shadow-sm" style="font-size:0.75rem">${pct}% <i class="bi bi-graph-down"></i></span>`;
                    }
                }

                let historyHtml = history.map(h => `<div class="prev-row d-flex justify-content-between py-2 border-bottom border-white-50">
                    <span class="prev-date">${formatDate(h.dateFrom)}</span>
                    <span class="prev-price">₱${h.price}</span>
                </div>`).join('');

                container.innerHTML += `
                <div class="col-12 col-md-6 col-lg-4 card-container" data-search="${p.name} ${p.subType}">
                    <div class="uiverse-card shadow-lg">
                        <div class="text-center mb-3">
                            <div class="current-label mb-3">CURRENT MARKET PRICE</div>
                            <h2 class="product-name mb-0">${p.name}</h2>
                            <div class="small fw-bold opacity-75 text-white">${p.subType || 'General Entry'}</div>
                        </div>

                        <div class="latest-price-section text-center py-3">
                            <span class="latest-val">₱${latest.price}</span>
                            <span class="latest-unit">PER ${latest.unit || 'KG'}</span>
                            <div class="mt-3 small fw-bold text-white bg-dark bg-opacity-25 py-2 rounded-4 mx-auto w-75">
                                ${formatDate(latest.dateFrom)} ${trend}
                            </div>
                        </div>

                        <div class="glass-history mt-auto">
                            <div class="history-title">Monitoring History</div>
                            ${historyHtml || '<div class="small opacity-50 text-center py-2">No history records</div>'}
                        </div>
                    </div>
                </div>`;
            }
        }
    });

    document.getElementById('marketSearchField').oninput = (e) => {
        const t = e.target.value.toLowerCase();
        document.querySelectorAll('.card-container').forEach(c => c.style.display = c.getAttribute('data-search').toLowerCase().includes(t) ? "block" : "none");
    };

    document.getElementById('btnLogin').onclick = async () => {
        try {
            const u = await signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value);
            const d = await getDoc(doc(db, "users", u.user.uid));
            if (d.data().status === 'approved' || d.data().role === 'admin') window.location.href = d.data().role === 'admin' ? "admin.html" : "manager.html";
            else { alert("Approval Pending."); auth.signOut(); }
        } catch (e) { alert("Login Error"); }
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
