<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin - Master Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>body{background:#0d1117; color:white;} .card{color:black; border-radius:12px;} .sticky-form{position:sticky; top:20px;}</style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-4 shadow"><div class="container-fluid"><span class="navbar-brand fw-bold">MASTER ADMIN PANEL</span><button class="btn btn-light btn-sm" onclick="location.href='index.html'">Logout</button></div></nav>
<div class="container-fluid px-4"><div class="row">
    <div class="col-md-4">
        <div class="card p-3 shadow mb-4 border-warning border-top border-5">
            <h5 class="fw-bold"><i class="bi bi-people-fill"></i> Pending Managers</h5><hr>
            <table class="table table-sm align-middle"><thead><tr><th>Email</th><th>Action</th></tr></thead><tbody id="uList"></tbody></table>
        </div>
        <div class="card p-4 shadow sticky-form border-primary border-top border-5">
            <h5 id="formTitle" class="fw-bold">Master Registry Form</h5><hr>
            <input type="hidden" id="aEditId">
            <div class="mb-2"><select id="aCat" class="form-select"><option>Fish and Seafoods</option><option>Pork/Beef/Chicken</option><option>Vegetables</option><option>Rice and Corn</option><option>Fuel & Petroleum</option><option>Other Basic Commodities</option></select></div>
            <div class="mb-2"><input type="text" id="aName" class="form-control" placeholder="Product"></div>
            <div class="mb-2"><input type="text" id="aSub" class="form-control" placeholder="Part"></div>
            <div class="row g-2 mb-2"><div class="col-8"><input type="text" id="aPrice" class="form-control" placeholder="Price"></div><div class="col-4"><select id="aUnit" class="form-select"><option>kg</option><option>Liter</option><option>Tank</option><option>Pc</option></select></div></div>
            <div class="row g-2 mb-3"><div class="col-6"><label class="small">From</label><input type="date" id="aFrom" class="form-control"></div><div class="col-6"><label class="small">To</label><input type="date" id="aTo" class="form-control"></div></div>
            <button id="btnAdminSave" class="btn btn-primary w-100 fw-bold">Save Master Entry</button>
            <button id="btnAdminCancel" class="btn btn-link w-100 d-none" onclick="location.reload()">Cancel</button>
        </div>
    </div>
    <div class="col-md-8 text-dark"><div class="bg-white p-4 rounded shadow"><h5 class="fw-bold mb-3">Grouped Registry History</h5><div class="accordion" id="adminAccordion"></div></div></div>
</div></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyAyWJulSuH_3gUo76aiLoy5L8ly5tk0ypQ", authDomain: "appdev-80339.firebaseapp.com", projectId: "appdev-80339", storageBucket: "appdev-80339.firebasestorage.app", messagingSenderId: "213205773696", appId: "1:213205773696:web:aca615f3274ee11f09e565" };
    const app = initializeApp(firebaseConfig), db = getFirestore(app), auth = getAuth(app);
    
    onAuthStateChanged(auth, async (u) => { if (u) { const d = await getDoc(doc(db, "users", u.uid)); if (d.data().role !== 'admin') window.location.href = "index.html"; } else window.location.href = "index.html"; });

    onSnapshot(collection(db, "users"), (snap) => {
        const ul = document.getElementById('uList'); ul.innerHTML = "";
        snap.forEach(d => { const u = d.data(); if(u.role === 'admin') return; ul.innerHTML += `<tr><td><small>${u.email}</small><br><span class="badge ${u.status==='pending'?'bg-warning':'bg-success'} text-dark">${u.status}</span></td><td><button class="btn btn-success btn-sm app-u" data-id="${d.id}"><i class="bi bi-check"></i></button> <button class="btn btn-danger btn-sm del-u" data-id="${d.id}"><i class="bi bi-trash"></i></button></td></tr>`; });
        document.querySelectorAll('.app-u').forEach(b => b.onclick = async () => await updateDoc(doc(db, "users", b.getAttribute('data-id')), { status: 'approved' }));
        document.querySelectorAll('.del-u').forEach(b => b.onclick = async () => { if(confirm("Del user?")) await deleteDoc(doc(db, "users", b.getAttribute('data-id'))); });
    });

    document.getElementById('btnAdminSave').onclick = async () => {
        const id = document.getElementById('aEditId').value, p = { name: document.getElementById('aName').value, category: document.getElementById('aCat').value, subType: document.getElementById('aSub').value, price: document.getElementById('aPrice').value, unit: document.getElementById('aUnit').value, dateFrom: document.getElementById('aFrom').value, dateTo: document.getElementById('aTo').value };
        if(!p.name || !p.price) return alert("Fill form");
        id ? await updateDoc(doc(db, "products", id), p) : await addDoc(collection(db, "products"), p);
        location.reload();
    };

    onSnapshot(collection(db, "products"), (snap) => {
        const acc = document.getElementById('adminAccordion'); acc.innerHTML = "";
        let items = []; snap.forEach(d => items.push({id: d.id, ...d.data()}));
        const groups = items.reduce((a, p) => { a[p.category] = a[p.category] || []; a[p.category].push(p); return a; }, {});
        Object.keys(groups).forEach((cat, idx) => {
            let rows = groups[cat].map(p => `<tr><td><b>${p.name}</b> (${p.subType})</td><td class="fw-bold">₱${p.price}/${p.unit || 'kg'}</td><td class="text-end"><button class="btn btn-sm btn-outline-primary ae" data-id="${p.id}"><i class="bi bi-pencil"></i></button> <button class="btn btn-sm btn-outline-danger ad" data-id="${p.id}"><i class="bi bi-trash"></i></button></td></tr>`).join('');
            acc.innerHTML += `<div class="accordion-item mb-2 border rounded"><h2 class="accordion-header"><button class="accordion-button collapsed fw-bold" data-bs-toggle="collapse" data-bs-target="#a_${idx}">${cat}</button></h2><div id="a_${idx}" class="accordion-collapse collapse"><div class="accordion-body p-0"><table class="table mb-0"><tbody>${rows}</tbody></table></div></div></div>`;
        });
        document.querySelectorAll('.ae').forEach(b => b.onclick = async () => {
            const s = await getDoc(doc(db, "products", b.getAttribute('data-id'))), d = s.data();
            document.getElementById('aEditId').value = b.getAttribute('data-id'); document.getElementById('aName').value = d.name; document.getElementById('aCat').value = d.category; document.getElementById('aSub').value = d.subType; document.getElementById('aPrice').value = d.price; document.getElementById('aUnit').value = d.unit || 'kg'; document.getElementById('aFrom').value = d.dateFrom; document.getElementById('aTo').value = d.dateTo;
            document.getElementById('formTitle').innerText = "Updating..."; document.getElementById('btnAdminSave').innerText = "Update Master"; document.getElementById('btnAdminCancel').classList.remove('d-none'); window.scrollTo(0,0);
        });
        document.querySelectorAll('.ad').forEach(b => b.onclick = async () => { if(confirm("Del entry?")) await deleteDoc(doc(db, "products", b.getAttribute('data-id'))); });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
